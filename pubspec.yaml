name: fat_battle
description: "减肥大作战 - 用游戏的方式打赢脂肪战争"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  
  # 路由
  go_router: ^15.1.2
  
  # 本地存储
  shared_preferences: ^2.5.3
  
  # BLE蓝牙通信（ESP32腰部Hub）
  flutter_blue_plus: ^1.35.4
  
  # 摄像头
  camera: ^0.11.1

  # Google ML Kit 姿态识别（替代帧差法）
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_commons: ^0.11.1

  # TensorFlow Lite - MoveNet 姿态估计（离线推理）
  # 升级到 0.12.1：0.11.0 依赖的 tensorflow-lite 2.11.0 在 AGP 9.0 下有 namespace 冲突
  tflite_flutter: ^0.12.1

  # 图表
  fl_chart: ^0.70.2
  
  # 语音播报
  flutter_tts: ^4.2.2
  
  # 权限管理
  permission_handler: ^11.4.0

  # GPS 定位与逆地理（城市菜系推荐）
  geolocator: ^14.0.0
  geocoding: ^4.0.0

  
  # 本地通知
  flutter_local_notifications: ^18.0.1
  
  # 时区
  timezone: ^0.10.0
  
  # 数学计算
  vector_math: ^2.1.4

  # 网络请求（食物识别 API 调用）
  http: ^1.2.2

  # 加密哈希（API 签名计算需要 md5）
  crypto: ^3.0.3

  # 图片压缩（确保百度API图片不超过4MB）
  flutter_image_compress: ^2.1.0
  image: ^4.0.0

  # 条形码扫描
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # 资源文件
  assets:
    - assets/images/
    - assets/data/
    - assets/models/