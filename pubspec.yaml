name: fat_battle
description: "减肥大作战 - 用游戏的方式打赢脂肪战争"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  
  # 路由
  go_router: ^15.1.2
  
  # 本地存储
  shared_preferences: ^2.5.3
  
  # BLE蓝牙通信（ESP32腰部Hub）
  flutter_blue_plus: ^1.35.4
  
  # 摄像头
  camera: ^0.11.1

  # Google ML Kit 姿态识别（替代帧差法）
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_commons: ^0.11.1

  # TensorFlow Lite - MoveNet 姿态估计（离线推理）
  tflite_flutter: ^0.11.0

  # 图表
  fl_chart: ^0.70.2
  
  # 语音播报
  flutter_tts: ^4.2.2
  
  # 权限管理
  permission_handler: ^11.4.0
  
  # 本地通知
  flutter_local_notifications: ^18.0.1
  
  # 时区
  timezone: ^0.10.0
  
  # 数学计算
  vector_math: ^2.1.4

  # 网络请求（食物识别 API 调用）
  http: ^1.2.2

  # 条形码扫描
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # 资源文件
  assets:
    - assets/images/
    - assets/data/
    - assets/models/