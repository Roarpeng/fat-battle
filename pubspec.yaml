name: fat_battle
description: "减肥大作战 - 用游戏的方式打赢脂肪战争"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  
  # 路由
  go_router: ^15.1.2
  
  # 本地存储
  shared_preferences: ^2.5.3
  
  # BLE蓝牙通信（ESP32腰部Hub）
  flutter_blue_plus: ^1.35.4
  
  # 摄像头
  camera: ^0.11.1
  
  # 图表
  fl_chart: ^0.70.2
  
  # 语音播报
  flutter_tts: ^4.2.2
  
  # 权限管理
  permission_handler: ^11.4.0
  
  # 数学计算
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # 资源文件
  assets:
    - assets/images/
    - assets/data/